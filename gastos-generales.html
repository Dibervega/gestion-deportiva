<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gastos Generales — Gestión Aire Libre y Aventura</title>
  <meta name="description" content="Control de gastos operativos generales de la empresa." />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .gasto-row { background:var(--bg-elevated); border:1px solid var(--border-subtle); border-radius:var(--radius-lg); padding:var(--space-4); display:flex; flex-direction:column; gap:var(--space-3); transition:border-color .2s; }
    .gasto-row:hover { border-color:var(--border-default); }
    .gasto-top { display:flex; align-items:flex-start; justify-content:space-between; gap:var(--space-3); }
    .gasto-desc { font-size:var(--text-sm); font-weight:600; color:var(--text-primary); }
    .gasto-sub  { font-size:var(--text-xs); color:var(--text-muted); margin-top:3px; display:flex; gap:10px; flex-wrap:wrap; }
    .gasto-monto { font-family:var(--font-display); font-size:1.1rem; font-weight:700; color:var(--danger-fg); white-space:nowrap; }
    .gasto-actions { display:flex; gap:var(--space-1); margin-top:var(--space-2); padding-top:var(--space-2); border-top:1px solid var(--border-subtle); flex-wrap:wrap; }
    .cat-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; margin-top:3px; }
    .resumen-bar { display:flex; gap:var(--space-4); flex-wrap:wrap; padding:var(--space-3) var(--space-4); background:var(--bg-overlay); border-radius:var(--radius-md); font-size:var(--text-xs); margin-bottom:var(--space-4); }
    .mes-header { font-size:var(--text-xs); font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--text-muted); padding:var(--space-3) 0 var(--space-2); border-bottom:1px solid var(--border-subtle); margin-bottom:var(--space-3); display:flex; justify-content:space-between; }
    .empty-gastos { text-align:center; padding:var(--space-10); color:var(--text-muted); }
    .filter-bar { display:flex; gap:var(--space-3); flex-wrap:wrap; align-items:center; margin-bottom:var(--space-5); }
    .filter-bar .form-control { min-width:140px; flex:1; }
    @media(max-width:600px){ .gasto-top{flex-direction:column;} .gasto-monto{font-size:.95rem;} }
  </style>
</head>
<body>
<div id="app-loader"><div class="loader-logo">🏔️ Gestión Aire Libre y Aventura</div><div class="loader-bar"><div class="loader-bar-fill"></div></div></div>
<div id="toast-container"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="page-content page-enter">

      <!-- KPIs -->
      <div class="grid-kpi" id="kpi-grid" style="margin-bottom:var(--space-6)"></div>

      <!-- Gráfica + Lista -->
      <div class="grid-main">

        <!-- Lista de gastos -->
        <div style="display:flex;flex-direction:column;gap:var(--space-4)">
          <div class="card">
            <div class="card-header">
              <div class="card-title">📋 Registro de Gastos</div>
              <button class="btn btn-primary btn-sm" onclick="openNuevoGasto()" id="btn-nuevo-gasto">+ Nuevo Gasto</button>
            </div>
            <div class="card-body">
              <!-- Filtros -->
              <div class="filter-bar">
                <input class="form-control" id="filtro-buscar" placeholder="🔍 Buscar descripción, proveedor..." oninput="renderLista()" />
                <select class="form-control" id="filtro-cat" onchange="renderLista()">
                  <option value="all">Todas las categorías</option>
                </select>
                <select class="form-control" id="filtro-estado" onchange="renderLista()">
                  <option value="all">Todos los estados</option>
                  <option value="pendiente">⏳ Pendiente</option>
                  <option value="aprobado">✅ Aprobado</option>
                  <option value="rechazado">❌ Rechazado</option>
                </select>
                <select class="form-control" id="filtro-mes" onchange="renderLista()">
                  <option value="all">Todos los meses</option>
                </select>
              </div>
              <div id="gastos-list"></div>
            </div>
          </div>
        </div>

        <!-- Panel derecho -->
        <div style="display:flex;flex-direction:column;gap:var(--space-4)">

          <!-- Chart por categoría -->
          <div class="card">
            <div class="card-header"><div class="card-title">📊 Por Categoría</div></div>
            <div class="card-body">
              <div class="chart-container" style="height:220px"><canvas id="chart-cat"></canvas></div>
              <div id="cat-legend" style="margin-top:var(--space-4);display:flex;flex-direction:column;gap:var(--space-2)"></div>
            </div>
          </div>

          <!-- Chart mensual -->
          <div class="card">
            <div class="card-header"><div class="card-title">📈 Tendencia Mensual</div></div>
            <div class="card-body">
              <div class="chart-container" style="height:180px"><canvas id="chart-mes"></canvas></div>
            </div>
          </div>

        </div>
      </div>

    </main>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/email.js"></script>
<script src="js/solicitudes.js"></script>
<script src="js/shared.js"></script>
<script>
// ── GASTOS GENERALES ─────────────────────────────────────────
let isAdmin = false;
let canWrite = false;
let chartCat = null, chartMes = null;

// ── Storage helpers ──────────────────────────────────────────
function getGastos() {
  return JSON.parse(localStorage.getItem('gestion_gastos_generales') || '[]');
}
function saveGastos(arr) {
  localStorage.setItem('gestion_gastos_generales', JSON.stringify(arr));
  // Sync a Firebase
  if (typeof FireSync !== 'undefined' && FireSync._ready && FireSync.db) {
    const obj = {};
    arr.forEach(g => { if (g.id) obj[g.id] = g; });
    FireSync.db.ref('gastos_generales').set(obj).catch(() => {});
  }
}
function addGasto(g) { const arr = getGastos(); arr.unshift(g); saveGastos(arr); }
function updateGasto(id, cambios) {
  const arr = getGastos(); const i = arr.findIndex(g => g.id === id);
  if (i >= 0) { arr[i] = { ...arr[i], ...cambios }; saveGastos(arr); }
}
function deleteGasto(id) { saveGastos(getGastos().filter(g => g.id !== id)); }

// ── Init ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  if (!initPage('gastos', {
    title: 'Gastos Generales',
    subtitle: 'Control de egresos operativos sin proyecto asignado',
    actions: `<button class="btn btn-primary btn-sm" onclick="openNuevoGasto()">+ Nuevo Gasto</button>`
  })) return;

  const user = Auth.getCurrentUser();
  isAdmin  = canSeeFinancials();
  canWrite = Auth.can('write') || isAdmin;

  // Si no es admin ni writer, ocultar botón de nuevo gasto
  if (!canWrite) document.getElementById('btn-nuevo-gasto').style.display = 'none';

  // Cargar desde Firebase también
  if (typeof FireSync !== 'undefined' && FireSync.db) {
    FireSync.db.ref('gastos_generales').get().then(snap => {
      if (snap.exists()) {
        const val = snap.val();
        const data = val ? (Array.isArray(val) ? val : Object.values(val)).filter(Boolean) : [];
        if (data.length) {
          localStorage.setItem('gestion_gastos_generales', JSON.stringify(data));
        }
      }
      renderAll();
    }).catch(() => renderAll());

    // Listener en tiempo real
    FireSync.db.ref('gastos_generales').on('child_added', snap => {
      const g = snap.val();
      if (!g) return;
      const arr = getGastos();
      if (!arr.find(x => x.id === g.id)) {
        arr.unshift(g);
        localStorage.setItem('gestion_gastos_generales', JSON.stringify(arr));
        renderAll();
      }
    });
  } else {
    renderAll();
  }

  // Poblar filtros
  poblarFiltros();
  setTimeout(hideLoader, 300);
});

function poblarFiltros() {
  // Categorías
  const catSel = document.getElementById('filtro-cat');
  CATEGORIAS_GASTO.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id; opt.textContent = `${c.emoji} ${c.label}`;
    catSel.appendChild(opt);
  });

  // Meses (últimos 12)
  const mesSel = document.getElementById('filtro-mes');
  const ahora = new Date();
  for (let i = 0; i < 12; i++) {
    const d = new Date(ahora.getFullYear(), ahora.getMonth() - i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label = d.toLocaleDateString('es-CO', { month: 'long', year: 'numeric' });
    const opt = document.createElement('option');
    opt.value = key; opt.textContent = label;
    mesSel.appendChild(opt);
  }
}

function renderAll() {
  renderKPIs();
  renderLista();
  renderCharts();
}

// ── KPIs ─────────────────────────────────────────────────────
function renderKPIs() {
  const gastos = getGastos();
  const total     = gastos.reduce((s,g) => s + (g.monto||0), 0);
  const aprobados = gastos.filter(g => g.estado==='aprobado').reduce((s,g) => s + (g.monto||0), 0);
  const pendientes= gastos.filter(g => g.estado==='pendiente').reduce((s,g) => s + (g.monto||0), 0);
  const esteMes   = gastos.filter(g => {
    const mes = g.fecha?.substring(0,7);
    const hoy = new Date().toISOString().substring(0,7);
    return mes === hoy;
  }).reduce((s,g) => s + (g.monto||0), 0);

  document.getElementById('kpi-grid').innerHTML = [
    { label:'Total Gastos',     value: Fmt.currency(total,true),      icon:'💸', cls:'kpi-danger' },
    { label:'Aprobados',        value: Fmt.currency(aprobados,true),  icon:'✅', cls:'kpi-success' },
    { label:'Pendientes',       value: Fmt.currency(pendientes,true), icon:'⏳', cls:'kpi-warning' },
    { label:'Este Mes',         value: Fmt.currency(esteMes,true),    icon:'📅', cls:'kpi-primary' },
    { label:'N° Registros',     value: gastos.length,                 icon:'📋', cls:'kpi-cyan' },
  ].map((k,i) => `
    <div class="kpi-card ${k.cls}" style="animation-delay:${i*60}ms">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.value}</div>
      <div class="kpi-icon ${k.cls}">${k.icon}</div>
    </div>
  `).join('');
}

// ── Lista ─────────────────────────────────────────────────────
function renderLista() {
  const cont  = document.getElementById('gastos-list');
  let gastos  = getGastos();
  const q     = document.getElementById('filtro-buscar').value.toLowerCase();
  const cat   = document.getElementById('filtro-cat').value;
  const estado= document.getElementById('filtro-estado').value;
  const mes   = document.getElementById('filtro-mes').value;

  if (q)       gastos = gastos.filter(g => (g.descripcion+g.proveedor+'').toLowerCase().includes(q));
  if (cat    !== 'all') gastos = gastos.filter(g => g.categoria === cat);
  if (estado !== 'all') gastos = gastos.filter(g => g.estado === estado);
  if (mes    !== 'all') gastos = gastos.filter(g => g.fecha?.startsWith(mes));

  if (!gastos.length) {
    cont.innerHTML = `<div class="empty-gastos"><div style="font-size:2.5rem;margin-bottom:12px">💸</div><div style="font-size:var(--text-base);font-weight:600;margin-bottom:6px">Sin gastos registrados</div><div style="font-size:var(--text-sm);color:var(--text-muted)">Registra los gastos operativos de la empresa</div>${canWrite?`<button class="btn btn-primary btn-sm" style="margin-top:16px" onclick="openNuevoGasto()">+ Registrar Primer Gasto</button>`:''}</div>`;
    return;
  }

  // Resumen filtrado
  const tot = gastos.reduce((s,g) => s+(g.monto||0), 0);
  const apr = gastos.filter(g=>g.estado==='aprobado').reduce((s,g)=>s+(g.monto||0),0);
  const pen = gastos.filter(g=>g.estado==='pendiente').reduce((s,g)=>s+(g.monto||0),0);

  const resumen = `<div class="resumen-bar">
    <span>Total: <strong style="color:var(--danger-fg)">${Fmt.currency(tot)}</strong></span>
    <span>✅ Aprobados: <strong style="color:var(--success-fg)">${Fmt.currency(apr)}</strong></span>
    <span>⏳ Pendientes: <strong style="color:var(--warning-fg)">${Fmt.currency(pen)}</strong></span>
    <span style="color:var(--text-muted)">${gastos.length} registros</span>
  </div>`;

  // Agrupar por mes
  const grupos = {};
  gastos.forEach(g => {
    const mes = g.fecha ? g.fecha.substring(0,7) : 'sin-fecha';
    if (!grupos[mes]) grupos[mes] = [];
    grupos[mes].push(g);
  });

  const html = Object.entries(grupos)
    .sort(([a],[b]) => b.localeCompare(a))
    .map(([mes, items]) => {
      const fecha = mes !== 'sin-fecha'
        ? new Date(mes+'-01').toLocaleDateString('es-CO',{month:'long',year:'numeric'})
        : 'Sin fecha';
      const totMes = items.reduce((s,g)=>s+(g.monto||0),0);
      return `
        <div class="mes-header">
          <span>📅 ${fecha.charAt(0).toUpperCase()+fecha.slice(1)}</span>
          <span style="color:var(--danger-fg)">${Fmt.currency(totMes)}</span>
        </div>
        ${items.map(g => renderGastoCard(g)).join('')}
      `;
    }).join('');

  cont.innerHTML = resumen + html;
}

function renderGastoCard(g) {
  const cat  = getCat(g.categoria);
  const estG = getEstadoGasto(g.estado || 'pendiente');
  const mp   = g.metodoPago ? getMetodoPago(g.metodoPago) : null;
  return `
    <div class="gasto-row" id="gasto-${g.id}">
      <div class="gasto-top">
        <div style="display:flex;gap:var(--space-3);align-items:flex-start;min-width:0">
          <div class="cat-dot" style="background:${cat.color||'var(--primary-500)'}"></div>
          <div class="min-w-0">
            <div class="gasto-desc">${escHtml(g.descripcion)}</div>
            <div class="gasto-sub">
              <span>${cat.emoji} ${cat.label}</span>
              ${g.proveedor ? `<span>🏢 ${escHtml(g.proveedor)}</span>` : ''}
              ${g.numeroFactura ? `<span>📄 <span style="font-family:var(--font-mono);color:var(--primary-400)">${escHtml(g.numeroFactura)}</span></span>` : ''}
              ${mp ? `<span>${mp.emoji} ${mp.label}</span>` : ''}
              ${g.fecha ? `<span>📅 ${Fmt.date(g.fecha)}</span>` : ''}
              ${g.notas ? `<span style="font-style:italic">💬 ${escHtml(g.notas)}</span>` : ''}
            </div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
          <span class="gasto-monto">${Fmt.currency(g.monto||0)}</span>
          <span class="badge ${estG.badge}">${estG.emoji} ${estG.label}</span>
          ${g.impuesto ? `<span style="font-size:.65rem;color:var(--text-muted)">Subtotal: ${Fmt.currency(g.subtotal||0)}</span>` : ''}
        </div>
      </div>
      ${g.estado==='rechazado'&&g.motivoRechazo ? `<div style="font-size:var(--text-xs);color:var(--danger-fg);padding-left:var(--space-5)">Motivo rechazo: ${escHtml(g.motivoRechazo)}</div>` : ''}
      ${canWrite || isAdmin ? `
      <div class="gasto-actions">
        ${isAdmin && g.estado==='pendiente' ? `
          <button class="btn btn-success btn-sm" style="font-size:.65rem;padding:4px 10px" onclick="aprobarGasto('${g.id}')">✅ Aprobar</button>
          <button class="btn btn-danger btn-sm" style="font-size:.65rem;padding:4px 10px" onclick="rechazarGasto('${g.id}')">❌ Rechazar</button>
        ` : ''}
        ${isAdmin && g.estado==='aprobado' ? `<button class="btn btn-ghost btn-sm" style="font-size:.65rem" onclick="rechazarGasto('${g.id}')">↩ Revertir</button>` : ''}
        ${canWrite ? `<button class="btn btn-ghost btn-sm" style="font-size:.65rem" onclick="openEditarGasto('${g.id}')">✏️ Editar</button>` : ''}
        ${isAdmin ? `<button class="btn btn-ghost btn-sm" style="font-size:.65rem;color:var(--danger-fg)" onclick="confirmarEliminar('${g.id}')">🗑️</button>` : ''}
      </div>` : ''}
    </div>
  `;
}

// ── Acciones ──────────────────────────────────────────────────
function aprobarGasto(id) {
  const user = Auth.getCurrentUser();
  updateGasto(id, { estado:'aprobado', aprobadoPor: user?.id, aprobadoEn: new Date().toISOString() });
  Toast.success('Gasto aprobado ✅'); renderAll();
}
function rechazarGasto(id) {
  const motivo = prompt('Motivo del rechazo:') || '';
  const user = Auth.getCurrentUser();
  updateGasto(id, { estado:'rechazado', rechazadoPor: user?.id, motivoRechazo: motivo });
  Toast.warning('Gasto rechazado'); renderAll();
}
function confirmarEliminar(id) {
  confirmDialog('¿Eliminar este gasto permanentemente?', 'Eliminar Gasto').then(ok => {
    if (!ok) return;
    deleteGasto(id); Toast.success('Gasto eliminado'); renderAll();
  });
}

// ── Modal Nuevo / Editar ──────────────────────────────────────
function openNuevoGasto() { openGastoModal(null); }
function openEditarGasto(id) { openGastoModal(getGastos().find(g => g.id === id)); }

function openGastoModal(gasto) {
  const esEditar = !!gasto;
  const { modal, close } = Modal.open(`
    <div class="modal-header">
      <div class="modal-title">${esEditar ? '✏️ Editar Gasto' : '💸 Nuevo Gasto General'}</div>
      <button class="modal-close" data-modal-close>✕</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;flex-direction:column;gap:var(--space-4)">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Descripción <span class="required">*</span></label>
            <input class="form-control" id="g-desc" placeholder="¿En qué se gastó?" value="${escHtml(gasto?.descripcion||'')}" />
          </div>
          <div class="form-group">
            <label class="form-label">Categoría <span class="required">*</span></label>
            <select class="form-control" id="g-cat">
              ${CATEGORIAS_GASTO.map(c => `<option value="${c.id}" ${gasto?.categoria===c.id?'selected':''}>${c.emoji} ${c.label}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Subtotal (sin IVA)</label>
            <input class="form-control" type="number" id="g-subtotal" placeholder="0" min="0" value="${gasto?.subtotal||''}" oninput="calcTotal()" />
          </div>
          <div class="form-group">
            <label class="form-label">IVA / Impuesto</label>
            <input class="form-control" type="number" id="g-iva" placeholder="0" min="0" value="${gasto?.impuesto||''}" oninput="calcTotal()" />
          </div>
          <div class="form-group">
            <label class="form-label">Total <span class="required">*</span></label>
            <input class="form-control" type="number" id="g-monto" placeholder="0" min="0" value="${gasto?.monto||''}" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">📅 Fecha <span class="required">*</span></label>
            <input class="form-control" type="date" id="g-fecha" value="${gasto?.fecha||new Date().toISOString().split('T')[0]}" />
          </div>
          <div class="form-group">
            <label class="form-label">Método de Pago</label>
            <select class="form-control" id="g-pago">
              <option value="">Sin especificar</option>
              ${METODOS_PAGO.map(m => `<option value="${m.id}" ${gasto?.metodoPago===m.id?'selected':''}>${m.emoji} ${m.label}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">🏢 Proveedor</label>
            <input class="form-control" id="g-prov" placeholder="Nombre del proveedor" value="${escHtml(gasto?.proveedor||'')}" />
          </div>
          <div class="form-group">
            <label class="form-label">📄 Nº Factura / Comprobante</label>
            <input class="form-control" id="g-factura" placeholder="FV-0001" value="${escHtml(gasto?.numeroFactura||'')}" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">💬 Notas</label>
          <textarea class="form-control" id="g-notas" rows="2" placeholder="Observaciones adicionales...">${escHtml(gasto?.notas||'')}</textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-modal-close>Cancelar</button>
      <button class="btn btn-primary" id="btn-guardar-gasto">${esEditar ? '💾 Guardar Cambios' : '+ Registrar Gasto'}</button>
    </div>
  `, { size: 'lg' });

  modal.querySelector('#btn-guardar-gasto').addEventListener('click', () => {
    const desc   = modal.querySelector('#g-desc').value.trim();
    const monto  = parseFloat(modal.querySelector('#g-monto').value);
    const fecha  = modal.querySelector('#g-fecha').value;
    if (!desc) { Toast.warning('La descripción es obligatoria'); return; }
    if (!monto || monto <= 0) { Toast.warning('El monto debe ser mayor a 0'); return; }
    if (!fecha) { Toast.warning('La fecha es obligatoria'); return; }

    const user = Auth.getCurrentUser();
    const datos = {
      descripcion:   desc,
      categoria:     modal.querySelector('#g-cat').value,
      subtotal:      parseFloat(modal.querySelector('#g-subtotal').value)||0,
      impuesto:      parseFloat(modal.querySelector('#g-iva').value)||0,
      monto,
      fecha,
      metodoPago:    modal.querySelector('#g-pago').value,
      proveedor:     modal.querySelector('#g-prov').value.trim(),
      numeroFactura: modal.querySelector('#g-factura').value.trim(),
      notas:         modal.querySelector('#g-notas').value.trim(),
    };

    if (esEditar) {
      updateGasto(gasto.id, datos);
      Toast.success('Gasto actualizado');
    } else {
      addGasto({
        id: generateId(),
        ...datos,
        estado: 'pendiente',
        registradoPor: user?.id || null,
        creadoEn: new Date().toISOString(),
      });
      Toast.success('Gasto registrado ✅');
    }
    close(); renderAll();
  });
}

function calcTotal() {
  const sub = parseFloat(document.getElementById('g-subtotal')?.value)||0;
  const iva = parseFloat(document.getElementById('g-iva')?.value)||0;
  const totalEl = document.getElementById('g-monto');
  if (totalEl && (sub || iva)) totalEl.value = (sub + iva).toFixed(0);
}

// ── Charts ───────────────────────────────────────────────────
function renderCharts() {
  const gastos = getGastos().filter(g => g.estado !== 'rechazado');

  // Por categoría
  const porCat = {};
  CATEGORIAS_GASTO.forEach(c => { porCat[c.id] = 0; });
  gastos.forEach(g => { if (porCat[g.categoria] !== undefined) porCat[g.categoria] += (g.monto||0); });
  const activas = CATEGORIAS_GASTO.filter(c => porCat[c.id] > 0);

  const canvasCat = document.getElementById('chart-cat');
  if (canvasCat) {
    if (chartCat) chartCat.destroy();
    if (activas.length) {
      chartCat = new Chart(canvasCat.getContext('2d'), {
        type: 'doughnut',
        data: { labels: activas.map(c=>c.label), datasets: [{ data: activas.map(c=>porCat[c.id]), backgroundColor: activas.map(c=>c.color), borderWidth:0, hoverOffset:8 }] },
        options: { responsive:true, maintainAspectRatio:false, cutout:'65%', plugins:{ legend:{display:false} } }
      });
      document.getElementById('cat-legend').innerHTML = activas.map(c => `
        <div style="display:flex;align-items:center;justify-content:space-between;font-size:var(--text-xs)">
          <div style="display:flex;align-items:center;gap:6px">
            <span style="width:8px;height:8px;border-radius:50%;background:${c.color};display:inline-block"></span>
            <span style="color:var(--text-secondary)">${c.emoji} ${c.label}</span>
          </div>
          <span style="font-weight:600;color:var(--text-primary)">${Fmt.currency(porCat[c.id],true)}</span>
        </div>
      `).join('');
    } else {
      canvasCat.parentElement.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-muted);font-size:var(--text-sm)">Sin datos</div>`;
    }
  }

  // Mensual (últimos 6 meses)
  const meses = [];
  const ahora = new Date();
  for (let i=5; i>=0; i--) {
    const d = new Date(ahora.getFullYear(), ahora.getMonth()-i, 1);
    meses.push({ key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`, label: d.toLocaleDateString('es-CO',{month:'short'}) });
  }
  const porMes = {};
  meses.forEach(m => { porMes[m.key] = 0; });
  gastos.forEach(g => { if (g.fecha && porMes[g.fecha.substring(0,7)] !== undefined) porMes[g.fecha.substring(0,7)] += (g.monto||0); });

  const canvasMes = document.getElementById('chart-mes');
  if (canvasMes) {
    if (chartMes) chartMes.destroy();
    chartMes = new Chart(canvasMes.getContext('2d'), {
      type: 'bar',
      data: {
        labels: meses.map(m => m.label),
        datasets: [{ label:'Gastos', data: meses.map(m => porMes[m.key]), backgroundColor:'rgba(244,63,94,0.5)', borderColor:'#f43f5e', borderWidth:2, borderRadius:6, borderSkipped:false }]
      },
      options: { responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false} },
        scales:{
          x:{ grid:{color:'rgba(255,255,255,.05)'}, ticks:{color:'#8b91a7',font:{size:11}} },
          y:{ grid:{color:'rgba(255,255,255,.05)'}, ticks:{color:'#8b91a7',callback:v=>Fmt.currency(v,true)}, beginAtZero:true }
        }
      }
    });
  }
}
</script>
