<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Eventos Cerrados — Gestión Aire Libre y Aventura</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <style>
    .cerrado-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      padding: var(--space-5);
      cursor: pointer;
      transition: all var(--transition-normal);
      box-shadow: var(--shadow-card);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      position: relative;
      overflow: hidden;
    }
    .cerrado-card::before {
      content: '🔒';
      position: absolute;
      top: 12px; right: 14px;
      font-size: 1rem;
      opacity: 0.4;
    }
    .cerrado-card:hover {
      border-color: rgba(16,185,129,.4);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }
    .cerrado-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(16,185,129,.12);
      border: 1px solid rgba(16,185,129,.3);
      color: #10b981;
      font-size: var(--text-xs); font-weight: 700;
      padding: 3px 10px; border-radius: 999px;
    }
    .cierre-info-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: var(--space-3);
      background: var(--bg-overlay); border-radius: var(--radius-md); padding: var(--space-3);
    }
    .cierre-info-item label {
      font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
      color: var(--text-muted); display: block; margin-bottom: 3px;
    }
    .cierre-info-item span { font-size: var(--text-sm); color: var(--text-primary); font-weight: 500; }
    .cierre-aprobado-row {
      display: flex; align-items: center; gap: 8px; font-size: var(--text-xs);
      color: #10b981; background: rgba(16,185,129,.08);
      border: 1px solid rgba(16,185,129,.2); border-radius: var(--radius-md); padding: 6px 12px;
    }
    .summary-strip {
      display: grid; grid-template-columns: repeat(3,1fr); gap: var(--space-3);
      margin-bottom: var(--space-5);
    }
    .summary-card {
      background: var(--bg-elevated); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl); padding: var(--space-4) var(--space-5);
      text-align: center;
    }
    .summary-card .val { font-size: var(--text-2xl); font-weight: 800; font-family: var(--font-display); }
    .summary-card .lbl { font-size: var(--text-xs); color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: .06em; }
    @media (max-width: 600px) { .summary-strip { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
<div id="app-loader"><div class="loader-logo">🏔️ Gestión Aire Libre y Aventura</div><div class="loader-bar"><div class="loader-bar-fill"></div></div></div>
<div id="toast-container"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="page-content page-enter">

      <!-- Filtro de búsqueda -->
      <div class="card" style="margin-bottom:var(--space-4)">
        <div class="card-body" style="padding:var(--space-4) var(--space-5)">
          <div style="display:flex;gap:var(--space-3);flex-wrap:wrap;align-items:center">
            <div class="search-bar" style="flex:1;min-width:180px">
              <span class="search-bar-icon">🔍</span>
              <input class="form-control" type="text" id="filter-buscar" placeholder="Buscar evento, cliente o ticket..." oninput="renderCerrados()" />
            </div>
            <select class="form-control" id="filter-year" style="width:auto;min-width:110px" onchange="renderCerrados()">
              <option value="all">📅 Todos los años</option>
            </select>
            <div style="color:var(--text-muted);font-size:var(--text-sm)" id="result-count"></div>
          </div>
        </div>
      </div>

      <!-- KPIs resumen -->
      <div class="summary-strip" id="summary-strip"></div>

      <!-- Grid de tarjetas -->
      <div id="cerrados-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:var(--space-4)"></div>

    </main>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/solicitudes.js"></script>
<script src="js/shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (!initPage('eventos-cerrados', {
    title: '🔒 Eventos Cerrados',
    subtitle: 'Eventos con cierre contable aprobado',
  })) return;

  // Llenar selector de años
  const all = (Store.get('solicitudes') || []).filter(s => s.cierreEvento?.aprobadoContabilidad);
  const years = [...new Set(all.map(s => new Date(s.cierreEvento.aprobadoEn).getFullYear()).filter(Boolean))].sort((a,b)=>b-a);
  const selYear = document.getElementById('filter-year');
  years.forEach(y => { selYear.innerHTML += `<option value="${y}">${y}</option>`; });

  renderCerrados();
});

function renderCerrados() {
  const q    = document.getElementById('filter-buscar')?.value.toLowerCase() || '';
  const year = document.getElementById('filter-year')?.value || 'all';

  let data = Solicitudes.getCerrados();

  if (q) data = data.filter(s =>
    s.titulo.toLowerCase().includes(q) ||
    s.cliente.toLowerCase().includes(q) ||
    (s.ticketId||'').toLowerCase().includes(q)
  );
  if (year !== 'all') data = data.filter(s =>
    new Date(s.cierreEvento.aprobadoEn).getFullYear() === parseInt(year)
  );

  document.getElementById('result-count').textContent = `${data.length} evento${data.length !== 1 ? 's' : ''} cerrado${data.length !== 1 ? 's' : ''}`;

  renderSummary(data);
  renderGrid(data);
}

function renderSummary(data) {
  const strip = document.getElementById('summary-strip');
  const totalValor   = data.reduce((s, x) => s + (x.financiero?.valorCotizado||0), 0);
  const totalUtilidad = data.reduce((s, x) => {
    try { return s + (Financiero?.calcularResumen(x)?.utilidad || 0); } catch { return s; }
  }, 0);
  strip.innerHTML = `
    <div class="summary-card">
      <div class="val" style="color:var(--primary-300)">${data.length}</div>
      <div class="lbl">Eventos cerrados</div>
    </div>
    <div class="summary-card">
      <div class="val" style="color:var(--success-fg)">${Fmt.currency(totalValor)}</div>
      <div class="lbl">Valor total</div>
    </div>
    <div class="summary-card">
      <div class="val" style="color:${totalUtilidad >= 0 ? 'var(--success-fg)' : 'var(--danger-fg)'}">${Fmt.currency(totalUtilidad)}</div>
      <div class="lbl">Utilidad neta total</div>
    </div>
  `;
}

function renderGrid(data) {
  const grid = document.getElementById('cerrados-grid');
  if (!data.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-state-icon">🔒</div>
      <div class="empty-state-title">Sin eventos cerrados</div>
      <div class="empty-state-desc">Los eventos con cierre contable aprobado aparecerán aquí</div>
    </div>`;
    return;
  }

  grid.innerHTML = data.map((s, i) => {
    const cierre = s.cierreEvento;
    const areas  = Array.isArray(s.areas) ? s.areas : [s.area].filter(Boolean);
    const asig   = getUserById(s.asignadoA);
    let fin = null;
    try { fin = canSeeFinancials() ? Financiero.calcularResumen(s) : null; } catch {}

    const aprobadoEn = cierre.aprobadoEn ? Fmt.date(cierre.aprobadoEn) : '—';
    const aprobadoPor = cierre.aprobadoPor ? (getUserById(cierre.aprobadoPor)?.nombre || cierre.aprobadoPor) : 'Admin';

    return `<div class="cerrado-card animate-fade-in" style="animation-delay:${i*30}ms" onclick="window.location.href='detalle-proyecto.html?id=${s.id}'">
      <div>
        <div class="request-id">${escHtml(s.ticketId)}</div>
        <div class="request-title" style="font-size:var(--text-base);font-weight:700;margin:4px 0">${escHtml(s.titulo)}</div>
        <div class="request-client">👤 ${escHtml(s.cliente)}</div>
      </div>

      <div style="display:flex;gap:var(--space-2);flex-wrap:wrap;align-items:center">
        ${areas.slice(0,2).map(aId => { const a=getArea(aId); return `<span class="badge badge-area">${a.emoji} ${a.nombre}</span>`; }).join('')}
        ${areas.length > 2 ? `<span class="badge badge-pending">+${areas.length-2}</span>` : ''}
        <span class="cerrado-badge">✅ Cierre aprobado</span>
      </div>

      ${fin ? `<div class="cierre-info-grid">
        <div class="cierre-info-item"><label>Valor total</label><span class="money">${Fmt.currency(fin.valorCotizado)}</span></div>
        <div class="cierre-info-item"><label>Anticipo</label><span>${Fmt.currency(fin.anticipo)}</span></div>
        <div class="cierre-info-item"><label>Utilidad</label><span style="color:${fin.utilidad >= 0 ? 'var(--success-fg)' : 'var(--danger-fg)'}">${Fmt.currency(fin.utilidad)}</span></div>
        <div class="cierre-info-item"><label>Margen</label><span>${fin.margen?.toFixed(1) || '0'}%</span></div>
      </div>` : ''}

      <div class="cierre-aprobado-row">
        ✅ Aprobado por <strong>${escHtml(aprobadoPor)}</strong> el ${aprobadoEn}
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;padding-top:var(--space-2);border-top:1px solid var(--border-subtle)">
        <div style="font-size:var(--text-xs);color:var(--text-muted)">
          📅 Evento: ${s.fechaEvento ? Fmt.date(s.fechaEvento) : 'Sin fecha'}
        </div>
        ${asig ? `<div class="avatar avatar-sm" style="background:${avatarColor(asig.nombre)}" data-tooltip="${escHtml(asig.nombre)}">${Fmt.initials(asig.nombre)}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
