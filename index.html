<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión Aire Libre y Aventura — Acceso</title>
  <meta name="description" content="Sistema de gestión de proyectos y eventos deportivos." />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111314;
      font-family: var(--font-sans, system-ui, sans-serif);
    }

    .login-wrap {
      width: 100%;
      max-width: 480px;
      padding: 48px 40px;
      margin: 20px;
    }

    .login-title {
      font-size: 2.2rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: 0.95rem;
      color: #6b7280;
      margin-bottom: 36px;
    }

    /* Botón Microsoft */
    .ms-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 16px 24px;
      border: 1.5px solid rgba(74, 160, 44, 0.45);
      border-radius: 14px;
      background: rgba(74, 160, 44, 0.1);
      color: #e5e7eb;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      font-family: inherit;
      letter-spacing: 0.01em;
    }
    .ms-btn:hover {
      background: rgba(74, 160, 44, 0.18);
      border-color: rgba(74, 160, 44, 0.7);
      transform: translateY(-1px);
    }
    .ms-btn:active { transform: translateY(0); }
    .ms-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .ms-logo { width: 22px; height: 22px; flex-shrink: 0; }

    /* Error */
    #login-error {
      color: #f87171;
      font-size: 0.82rem;
      margin-top: 12px;
      min-height: 16px;
      text-align: center;
    }

    /* Info box */
    .login-info-box {
      margin-top: 28px;
      padding: 14px 18px;
      background: rgba(74, 160, 44, 0.07);
      border: 1px solid rgba(74, 160, 44, 0.2);
      border-radius: 12px;
      font-size: 0.82rem;
      color: #6b7280;
      text-align: center;
      line-height: 1.65;
    }
    .login-info-box strong { color: #9ca3af; }

    /* Spinner */
    .spinner {
      display: inline-block; width: 15px; height: 15px;
      border: 2px solid rgba(74,160,44,0.3);
      border-top-color: #4aa02c;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Loader */
    #app-loader {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      background: #111314;
      transition: opacity 0.4s;
    }
    #app-loader.hidden { opacity: 0; pointer-events: none; }
    .loader-text { font-size: 1rem; color: #6b7280; letter-spacing: 0.05em; }
    .loader-bar {
      width: 160px; height: 3px;
      background: rgba(74,160,44,0.15); border-radius: 99px; overflow: hidden;
    }
    .loader-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #4aa02c, #7ed348);
      border-radius: 99px;
      animation: loadBar 1.6s ease-in-out infinite;
    }
    @keyframes loadBar {
      0%   { width: 0%;  margin-left: 0%; }
      50%  { width: 65%; margin-left: 18%; }
      100% { width: 0%;  margin-left: 100%; }
    }
  </style>
</head>
<body>

<div id="app-loader">
  <div class="loader-text">Gestión Aire Libre y Aventura</div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<div id="toast-container"></div>

<div class="login-wrap">
  <div class="login-title">Bienvenido</div>
  <div class="login-subtitle">Ingresa con tu cuenta corporativa de Office 365</div>

  <button class="ms-btn" id="ms-login-btn" onclick="iniciarSesionMicrosoft()">
    <svg class="ms-logo" viewBox="0 0 23 23" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="1" width="10" height="10" fill="#f25022"/>
      <rect x="12" y="1" width="10" height="10" fill="#7fba00"/>
      <rect x="1" y="12" width="10" height="10" fill="#00a4ef"/>
      <rect x="12" y="12" width="10" height="10" fill="#ffb900"/>
    </svg>
    Entrar con Microsoft 365
  </button>

  <p id="login-error"></p>

  <div class="login-info-box">
    🔐 <strong>Acceso seguro.</strong> Usa tu cuenta corporativa de Office 365.<br>
    Si no tienes acceso, contacta al administrador.
  </div>
</div>

<!-- Scripts -->
<script src="js/msal-browser.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="js/firebase-config.js?v=9"></script>
<script src="js/app.js?v=9"></script>
<script src="js/shared.js?v=9"></script>
<script src="js/auth.js?v=9"></script>
<script src="js/msal-auth.js?v=9"></script>
<script>
function hideLoader() {
  const l = document.getElementById('app-loader');
  if (l) { l.classList.add('hidden'); setTimeout(() => l.remove(), 500); }
}

document.addEventListener('DOMContentLoaded', async () => {
  const errEl = document.getElementById('login-error');
  const btn   = document.getElementById('ms-login-btn');
  try {
    const user = await handleMsalRedirect();
    if (user) {
      btn.innerHTML = `<svg class="ms-logo" viewBox="0 0 23 23" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="10" height="10" fill="#f25022"/><rect x="12" y="1" width="10" height="10" fill="#7fba00"/><rect x="1" y="12" width="10" height="10" fill="#00a4ef"/><rect x="12" y="12" width="10" height="10" fill="#ffb900"/></svg> ✅ Bienvenido, ${user.nombre.split(' ')[0]}`;
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 700);
      return;
    }
  } catch (err) {
    errEl.textContent = err.message;
    btn.disabled = false;
  }
  hideLoader();
});

async function iniciarSesionMicrosoft() {
  const btn   = document.getElementById('ms-login-btn');
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span> Conectando con Microsoft...`;
  await loginConMicrosoft();
}
</script>
</body>
</html>
